name: cmip_bayes

channels:
  - conda-forge

dependencies:
  - python=3.11

  # Core scientific stack
  - numpy
  - scipy
  - pandas
  - xarray
  - matplotlib
  - seaborn

  # Bayesian modeling
  - pymc
  - pytensor
  - arviz

  # Visualization / graph rendering
  - graphviz        # system binary (dot)
  - python-graphviz # Python wrapper

  # Jupyter support (Binder safe)
  - notebook
  - ipykernel

  # Optional but commonly required by pymc stack
  - h5py
  - netcdf4

  - pip